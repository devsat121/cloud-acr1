name: Build APKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;34.0.0"

      - name: Generate wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Build main APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Build helper APK
        run: ./gradlew :helper:assembleDebug --no-daemon

      - name: Upload main APK
        uses: actions/upload-artifact@v4
        with:
          name: CloudACR-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload helper APK
        uses: actions/upload-artifact@v4
        with:
          name: CloudACR-Helper-debug
          path: helper/build/outputs/apk/debug/helper-debug.apk
